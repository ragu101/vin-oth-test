name: "CI — Build & Test"

# Working Python CI — generated by LaneSync.
# Runs pytest with HTML + coverage reports and uploads evidence to LaneSync.

on:
  pull_request:
    branches: [ "main", "rel/*" ]
  push:
    branches: [ "main", "rel/*" ]

jobs:
  build:
    name: "CI — Build & Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-html pytest-cov
          [ -f requirements.txt ] && pip install -r requirements.txt || true
          [ -f pyproject.toml ] && pip install -e . || true

      - name: Run unit tests
        run: |
          pytest --html=unit-tests.html --self-contained-html \
                 --cov --cov-report=html:coverage || TEST_EXIT=$?
          [ -f unit-tests.html ] || echo "<html><body><h1>Unit Tests</h1></body></html>" > unit-tests.html
          mkdir -p coverage
          [ -f coverage/index.html ] || echo "<html><body><h1>Coverage</h1></body></html>" > coverage/index.html
          echo "<html><body><h1>Integration Tests</h1><p>Configure integration tests here.</p></body></html>" > integration-tests.html
          exit ${TEST_EXIT:-0}

      - name: Dependency audit (CVE)
        if: always()
        run: |
          pip install pip-audit >/dev/null 2>&1 || true
          echo "<html><body><h1>CVE / pip-audit</h1><pre>$(pip-audit 2>/dev/null | head -50 || echo 'no audit output')</pre></body></html>" > cve-scan.html
          echo "<html><body><h1>CodeQL</h1><p>Enable GitHub code scanning for full SARIF.</p></body></html>" > codeql-report.html

      - name: Build evidence metrics
        if: always()
        run: |
          cat > sdlc-evidence.json <<EOF
          {
            "unit_tests":        { "total": 0, "passed": 0, "failed": 0 },
            "integration_tests": { "total": 0, "passed": 0, "failed": 0 },
            "coverage":          { "line_percent": 0 },
            "codeql":            { "vulnerabilities": { "critical": 0, "high": 0, "medium": 0 }, "scanned_files": 0 },
            "security":          { "tool": "pip-audit", "vulnerabilities": { "critical": 0, "high": 0, "medium": 0 } }
          }
          EOF

      - name: Upload reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.sha }}
          path: |
            sdlc-evidence.json
            unit-tests.html
            integration-tests.html
            coverage/
            codeql-report.html
            cve-scan.html
          retention-days: 30

      - name: Upload evidence to LaneSync
        if: ${{ always() && startsWith(github.ref, 'refs/heads/rel/') }}
        env:
          SDLC_API_URL: ${{ vars.SDLC_API_URL }}
        run: |
          if [ -z "$SDLC_API_URL" ]; then echo "SDLC_API_URL not set — skipping (non-blocking)."; exit 0; fi
          VERSION="${GITHUB_REF#refs/heads/rel/}"
          PAYLOAD=$(jq -n \
            --arg org "${{ github.repository_owner }}" \
            --arg repo "${{ github.event.repository.name }}" \
            --arg version "$VERSION" \
            --argjson metrics "$(cat sdlc-evidence.json)" \
            --rawfile unit_html unit-tests.html \
            --rawfile integration_html integration-tests.html \
            --rawfile coverage_html coverage/index.html \
            --rawfile codeql_html codeql-report.html \
            --rawfile cve_html cve-scan.html \
            '{ org: $org, repo: $repo, version: $version, pipeline: "CI — Build & Test", metrics: $metrics,
               reports: { unit_tests: $unit_html, integration_tests: $integration_html, coverage: $coverage_html, codeql: $codeql_html, security: $cve_html } }')
          curl -s -X POST "$SDLC_API_URL/api/evidence/upload" -H "Content-Type: application/json" -d "$PAYLOAD" || echo "Evidence upload failed (non-blocking)."

  tag:
    name: Auto-Tag on Push
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
    env:
      HAS_APP_TOKEN: ${{ secrets.SDLC_APP_PRIVATE_KEY != '' && secrets.SDLC_APP_ID != '' }}
    steps:
      - name: Generate App Token
        id: generate-token
        if: env.HAS_APP_TOKEN == 'true'
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SDLC_APP_ID }}
          private-key: ${{ secrets.SDLC_APP_PRIVATE_KEY }}

      - name: Checkout Code
        if: env.HAS_APP_TOKEN == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}

      - name: Generate and Push Tag
        if: env.HAS_APP_TOKEN == 'true'
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          if [[ "$BRANCH_NAME" == "main" ]]; then
            NEW_TAG="dev-${SHA_SHORT}"
          elif [[ "$BRANCH_NAME" == rel/* ]]; then
            VERSION=${BRANCH_NAME#rel/}
            NEW_TAG="${VERSION}-rc-${SHA_SHORT}"
          else
            echo "Branch not targeted for auto-tagging."; exit 0
          fi
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "Pushed tag: $NEW_TAG"
